<text x="265.8" y="576" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#6b7280">3 $/MWh shock</text>
<text x="331.8" y="437.5" font-family="Arial, sans-serif" font-size="12" fill="#374151">0.08 - 1.92 c</text>
<text x="331.8" y="517.4" font-family="Arial, sans-serif" font-size="12" fill="#111827">mid 0.36 c</text>
