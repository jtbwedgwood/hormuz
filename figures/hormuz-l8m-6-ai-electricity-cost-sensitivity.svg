<text x="784.2" y="576" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#6b7280">14 $/MWh shock</text>
<text x="850.2" y="112.9" font-family="Arial, sans-serif" font-size="12" fill="#374151">0.39 - 8.96 c</text>
<text x="850.2" y="456.5" font-family="Arial, sans-serif" font-size="12" fill="#111827">mid 1.68 c</text>
<rect x="750" y="120" width="170" height="80" fill="#ffffff" stroke="#d1d5db"/>
