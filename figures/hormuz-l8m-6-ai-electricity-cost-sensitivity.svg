<text x="108" y="97.0" font-family="Arial, sans-serif" font-size="14" text-anchor="end" fill="#4b5563">9.5</text>
<line x1="120" y1="92" x2="120" y2="530" stroke="#111827" stroke-width="1.3"/>
<line x1="120" y1="530" x2="930" y2="530" stroke="#111827" stroke-width="1.3"/>
<text x="24" y="320.0" transform="rotate(-90 24 320.0)" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#374151">Extra electricity cost (cents per 1M tokens)</text>
<text x="72" y="88" font-family="Arial, sans-serif" font-size="15" fill="#6b7280">Band = 0.25-4.0 kWh / 1M tokens × PUE 1.1-1.6 × electricity shock; midpoint uses 1.0 kWh / 1M tokens and PUE 1.2.</text>
<line x1="265.8" y1="441.5" x2="265.8" y2="526.2" stroke="#2563eb" stroke-width="14" stroke-linecap="round" opacity="0.28"/>
