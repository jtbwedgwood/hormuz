<text x="591.0" y="495.3" font-family="Arial, sans-serif" font-size="12" fill="#111827">mid 0.84 c</text>
<line x1="784.2" y1="116.9" x2="784.2" y2="512.2" stroke="#dc2626" stroke-width="14" stroke-linecap="round" opacity="0.28"/>
